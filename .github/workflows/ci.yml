name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6am UTC — warm caches

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which files changed ──────────────────────────────────────────
  changes:
    name: Filter based on Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'

  # ── Frontend (always — fast, no Rust) ──────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm vitest run --coverage
      - uses: codecov/codecov-action@v7
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Backend (only when Rust files change) ──────────────────────────────
  backend:
    name: Backend CI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    env:
      RUSTC_WRAPPER: sccache

    steps:
      - uses: actions/checkout@v7

      # ── System Dependencies ──────────────────────────────────────────────
      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install tesseract leptonica pkg-config
          pkg-config --modversion tesseract
          pkg-config --modversion lept

      - name: Configure vcpkg + binary cache (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $cacheDir = "$env:RUNNER_TEMP\vcpkg-cache"
          New-Item -ItemType Directory -Force -Path $cacheDir
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_BINARY_SOURCES=clear;files,$cacheDir,readwrite" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_MAX_CONCURRENT=$env:NUMBER_OF_PROCESSORS" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Restore vcpkg binary cache (Windows)
        if: matrix.os == 'windows-latest'
        id: vcpkg-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('src-tauri/vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install system deps (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: vcpkg install tesseract leptonica

      # ── Tools ─────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - run: pnpm install --frozen-lockfile

      # ── Tessdata bundle ─────────────────────────────────────────────────
      - name: Cache tessdata
        id: cache-tessdata
        uses: actions/cache@v5
        with:
          path: src-tauri/tessdata
          key: tessdata-${{ runner.os }}

      - name: Download tessdata
        if: steps.cache-tessdata.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p src-tauri/tessdata
          curl -fLo src-tauri/tessdata/eng.traineddata \
            https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata
          curl -fLo src-tauri/tessdata/spa.traineddata \
            https://github.com/tesseract-ocr/tessdata_fast/raw/main/spa.traineddata

      # ── Pdfium bundle ──────────────────────────────────────────────────
      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v5
        with:
          path: src-tauri/pdfium
          key: pdfium-${{ runner.os }}

      - name: Download pdfium library
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/download-pdfium.sh latest

      - name: Codesign pdfium (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: codesign -f -s - src-tauri/pdfium/libpdfium.dylib 2>/dev/null || true

      # ── Coverage tool ────────────────────────────────────────────────
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # ── Backend checks & coverage ────────────────────────────────────
      - name: Rust checks & coverage
        shell: bash
        run: |
          set -e
          cd src-tauri
          cargo fmt --check
          cargo clippy --tests -- -D warnings
          cargo llvm-cov --lcov --output-path lcov.info

      # ── Upload coverage ──────────────────────────────────────────────
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: src-tauri/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

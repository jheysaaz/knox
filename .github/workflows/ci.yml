name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── System Dependencies ──────────────────────────────────────────────
      # Tauri v2 runtime libs + OCR dev headers for tesseract-sys/leptonica-sys
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libtesseract-dev \
            libleptonica-dev \
            pkg-config \
            build-essential
          # Verify pkg-config can find OCR libs (fails fast if missing)
          pkg-config --modversion tesseract
          pkg-config --modversion lept

      # ── pnpm ─────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ─────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Frontend ─────────────────────────────────────────────────────────
      - run: pnpm install --frozen-lockfile

      # ── Tessdata bundle ─────────────────────────────────────────────────
      # Download Tesseract language data so the resource glob (tauri.conf.json)
      # succeeds and the app is self-contained (no system tessdata required).
      - name: Download tessdata
        run: |
          mkdir -p src-tauri/tessdata
          curl -fLo src-tauri/tessdata/eng.traineddata \
            https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata
          curl -fLo src-tauri/tessdata/spa.traineddata \
            https://github.com/tesseract-ocr/tessdata_fast/raw/main/spa.traineddata

      - name: TypeScript check + Vite build
        run: pnpm build

      - name: Frontend tests
        run: pnpm test

      # ── Rust checks ──────────────────────────────────────────────────────
      - name: Formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Backend tests
        working-directory: src-tauri
        run: cargo test

name: ocr-libs

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish archives to a GitHub Release"
        required: false
        default: "false"
      release_tag:
        description: "Release tag to publish (e.g., ocr-libs-v1)"
        required: false
        default: ""
  push:
    tags:
      - "ocr-libs-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    env:
      TESSERACT_VERSION: 5.3.4
      LEPTONICA_VERSION: 1.84.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja pkg-config autoconf automake libtool

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool build-essential yasm

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: choco install -y cmake ninja

      - name: Build static Leptonica + Tesseract (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          curl -L -o leptonica.tar.gz https://github.com/DanBloomberg/leptonica/archive/refs/tags/${LEPTONICA_VERSION}.tar.gz
          curl -L -o tesseract.tar.gz https://github.com/tesseract-ocr/tesseract/archive/refs/tags/${TESSERACT_VERSION}.tar.gz
          tar -xzf leptonica.tar.gz
          tar -xzf tesseract.tar.gz
          bash scripts/build-tesseract-static.sh ${{ matrix.target }} leptonica-${LEPTONICA_VERSION} tesseract-${TESSERACT_VERSION}

      - name: Build static Leptonica + Tesseract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -OutFile leptonica.zip https://github.com/DanBloomberg/leptonica/archive/refs/tags/${env:LEPTONICA_VERSION}.zip
          Invoke-WebRequest -OutFile tesseract.zip https://github.com/tesseract-ocr/tesseract/archive/refs/tags/${env:TESSERACT_VERSION}.zip
          Expand-Archive leptonica.zip -DestinationPath .
          Expand-Archive tesseract.zip -DestinationPath .
          $lept = "leptonica-$env:LEPTONICA_VERSION"
          $tess = "tesseract-$env:TESSERACT_VERSION"
          bash scripts/build-tesseract-static.sh ${{ matrix.target }} $lept $tess

      - name: Package archives (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          cd src-tauri/third_party/native
          tar -czf ocr-libs-${{ matrix.target }}.tar.gz ${{ matrix.target }}

      - name: Package archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/third_party/native/${{ matrix.target }} -DestinationPath ocr-libs-${{ matrix.target }}.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocr-libs-${{ matrix.target }}
          path: |
            ocr-libs-${{ matrix.target }}.${{ matrix.archive }}

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/ocr-libs-v') || inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ocr-libs-${{ matrix.target }}.${{ matrix.archive }}
          tag_name: ${{ inputs.release_tag || github.ref_name }}

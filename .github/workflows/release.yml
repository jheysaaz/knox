name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_tag:
        description: >
          Version string (e.g., 1.0.0, 1.0.0-rc.1).
          Use 'draft' for an unreleased build (artifacts uploaded to workflow run only).
        required: true
        default: draft
      build_macos:
        description: "Build for macOS (.dmg)"
        required: false
        default: true
        type: boolean
      build_windows:
        description: "Build for Windows (.msi)"
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Setup ────────────────────────────────────────────────────────────────
  # Single source of truth for: version resolution + build matrix.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      version: ${{ steps.resolve-version.outputs.version }}

    steps:
      # ── Version ────────────────────────────────────────────────────────
      # Tag push  → strip v prefix (v1.0.0 → 1.0.0).
      # Dispatch   → use input, or 0.0.0-draft.<ts> when input is 'draft'.
      - id: resolve-version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.version_tag }}" == "draft" ]]; then
            VERSION="0.0.0-draft.$(date +%s)"
            echo "version=${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ inputs.version_tag }}"
            echo "version=${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      # ── Matrix ─────────────────────────────────────────────────────────
      # Tag push   → macOS + Windows.
      # Dispatch   → only the OSes the user ticked.
      - id: build-matrix
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            MATRIX='{"include":[
              {"os":"macos-latest","target":"aarch64-apple-darwin","bundle-ext":"macos"},
              {"os":"windows-latest","target":"x86_64-pc-windows-msvc","bundle-ext":"windows"}
            ]}'
          else
            ENTRIES='[]'
            if [[ "${{ inputs.build_macos }}" == "true" ]]; then
              ENTRIES=$(echo "$ENTRIES" | jq -c '. + [{"os":"macos-latest","target":"aarch64-apple-darwin","bundle-ext":"macos"}]')
            fi
            if [[ "${{ inputs.build_windows }}" == "true" ]]; then
              ENTRIES=$(echo "$ENTRIES" | jq -c '. + [{"os":"windows-latest","target":"x86_64-pc-windows-msvc","bundle-ext":"windows"}]')
            fi
            # Fail early if nothing selected
            if [[ "$ENTRIES" == "[]" ]]; then
              echo "ERROR: At least one OS must be selected."
              exit 1
            fi
            MATRIX="{\"include\":$ENTRIES}"
          fi
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # ── Build Matrix ─────────────────────────────────────────────────────────
  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      # ── Platform System Dependencies ──────────────────────────────────
      # tesseract-sys & leptonica-sys use pkg-config on macOS, vcpkg on Windows.
      #
      # macOS:   Homebrew .pc files → pkg-config finds them.
      # Windows: vcpkg installs static libs → the vcpkg Rust build helper
      #          (used internally by both -sys crates) discovers them via
      #          VCPKG_ROOT with the default triplet x64-windows-static-md.

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install tesseract leptonica pkg-config
          echo "=== pkg-config verification ==="
          pkg-config --modversion tesseract
          pkg-config --modversion lept

      - name: Configure vcpkg + binary cache (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $cacheDir = "$env:RUNNER_TEMP\vcpkg-cache"
          New-Item -ItemType Directory -Force -Path $cacheDir
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_BINARY_SOURCES=files,$cacheDir,readwrite" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "VCPKG_MAX_CONCURRENT=$env:NUMBER_OF_PROCESSORS" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Restore vcpkg binary cache (Windows)
        if: matrix.os == 'windows-latest'
        id: vcpkg-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('src-tauri/vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install system deps (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: vcpkg install tesseract leptonica

      # ── Tools ─────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # ── Tessdata bundle ───────────────────────────────────────────────
      # Download Tesseract language data so the resource glob succeeds
      # and the app ships self-contained (no system tessdata required).
      - name: Cache tessdata
        id: cache-tessdata
        uses: actions/cache@v5
        with:
          path: src-tauri/tessdata
          key: tessdata-${{ runner.os }}

      - name: Download tessdata
        if: steps.cache-tessdata.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p src-tauri/tessdata
          curl -fLo src-tauri/tessdata/eng.traineddata \
            https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata
          curl -fLo src-tauri/tessdata/spa.traineddata \
            https://github.com/tesseract-ocr/tessdata_fast/raw/main/spa.traineddata

      # ── Pdfium bundle ────────────────────────────────────────────────
      # Download the pdfium dynamic library for the current platform.
      # The tauri.conf.json resource glob requires these files to exist.
      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v5
        with:
          path: src-tauri/pdfium
          key: pdfium-${{ runner.os }}

      - name: Download pdfium library
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/download-pdfium.sh latest

      - name: Codesign pdfium (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: codesign -f -s - src-tauri/pdfium/libpdfium.dylib 2>/dev/null || true

      # ── Version Injection ─────────────────────────────────────────────
      - name: Set version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          cd src-tauri
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Cargo.toml version → ${VERSION}"

      # ── Build ─────────────────────────────────────────────────────────
      # tauri-action builds and emits bundles under
      #   src-tauri/target/release/bundle/<platform>/
      - uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: src-tauri

      # ── Artifact Upload ──────────────────────────────────────────────
      # Always runs (tag push + manual dispatch).
      # Manual dispatch users download from the workflow run summary page.
      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cd src-tauri/target/release/bundle
          # Only installer and updater files — exclude DMG build templates
          find . -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.sig' -o -name '*.tar.gz' -o -name '*.json' \) -exec cp {} ../../../../artifacts/ \;
          echo "=== Artifacts ==="
          ls -la ../../../../artifacts/

      - uses: actions/upload-artifact@v7
        with:
          name: knox-bundle-${{ matrix.bundle-ext }}
          path: artifacts
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────
  # Aggregates all platform bundles into a SINGLE release.
  # Only runs on tag push — not on manual dispatch.
  release:
    needs: [setup, build]
    if: success() && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: knox-bundle-*
          path: bundles
          merge-multiple: true

      - name: Flatten bundles
        run: |
          # Bundles are already flat from the prepare step — just in case.
          find bundles -mindepth 2 -type f -exec mv {} bundles/ \; 2>/dev/null || true
          find bundles -mindepth 1 -type d -exec rm -rf {} + 2>/dev/null || true
          echo "=== Bundles ==="
          ls -1 bundles/

      - name: Generate latest.json
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/jheysaaz/knox/releases/download/v${VERSION}"

          PLATFORMS="{}"

          # macOS DMG
          DMG=$(ls bundles/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            SIG=$(cat "$(ls bundles/*.dmg.sig 2>/dev/null | head -1)" 2>/dev/null || echo "")
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$SIG" \
              --arg url "${BASE_URL}/$(basename "$DMG")" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          # Windows MSI (primary Windows target)
          MSI=$(ls bundles/*.msi 2>/dev/null | head -1)
          if [ -n "$MSI" ]; then
            SIG=$(cat "$(ls bundles/*.msi.sig 2>/dev/null | head -1)" 2>/dev/null || echo "")
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$SIG" \
              --arg url "${BASE_URL}/$(basename "$MSI")" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{"version": $version, "notes": "", "pub_date": $pub_date, "platforms": $platforms}' \
            > bundles/latest.json

          echo "=== latest.json ==="
          cat bundles/latest.json

      - uses: softprops/action-gh-release@v3
        with:
          name: v${{ needs.setup.outputs.version }}
          tag_name: v${{ needs.setup.outputs.version }}
          files: bundles/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
